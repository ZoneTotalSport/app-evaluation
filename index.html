<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="EvalEPS — Carnet d'évaluation pour éducateurs physiques. zonetotalsport.ca" />
  <meta name="theme-color" content="#0077CC" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>EvalEPS — Zone Total Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Boogaloo&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- GYM BACKGROUND -->
  <div id="gymBg"></div>

  <!-- TOOLBAR -->
  <header class="toolbar">
    <div class="toolbar-left">
      <img src="img/bucheron-salut.png" alt="" class="toolbar-mascot" />
      <span class="toolbar-title">EvalEPS</span>
    </div>
    <div class="toolbar-center">
      <button class="tool-btn" onclick="createGroup()" title="Nouveau groupe">➕ Groupe</button>
      <button class="tool-btn" onclick="openLexiqueModal()" title="Critères PFEQ">📚 PFEQ</button>
      <button class="tool-btn" onclick="addColumnPrompt()" title="Ajouter critère">📝 Critère</button>
      <span class="toolbar-sep"></span>
      <button class="tool-btn" onclick="exportPDF()" title="Exporter PDF">📄 PDF</button>
      <button class="tool-btn" onclick="exportCSV()" title="Exporter CSV">📊 CSV</button>
      <button class="tool-btn" onclick="printResults()" title="Imprimer">🖨️</button>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn name-order-btn" onclick="toggleNameOrder()" id="name-order-btn" title="Ordre du nom">P.N</button>
      <select id="date-select" class="tool-select" onchange="onDateChange()"></select>
      <select id="lang-select" class="tool-select" onchange="setLang(this.value)">
        <option value="fr">FR</option>
        <option value="en">EN</option>
      </select>
    </div>
  </header>

  <!-- NOTEBOOK LAYOUT -->
  <div class="notebook">

    <!-- LEFT: STUDENT LIST -->
    <div class="notebook-left" id="notebook-left">
      <div class="student-header">
        <span class="sh-num">#</span>
        <span class="sh-photo"></span>
        <span class="sh-name">ÉLÈVE</span>
      </div>
      <div class="student-list" id="student-list">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- CENTER: GRADE GRID -->
    <div class="notebook-center" id="notebook-center">
      <!-- CRITERIA TABS (TOP) -->
      <div class="criteria-tabs" id="criteria-tabs">
        <!-- Filled by JS -->
      </div>
      <!-- GRADE GRID -->
      <div class="grade-grid" id="grade-grid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- RIGHT: GROUP TABS -->
    <div class="notebook-right" id="notebook-right">
      <div class="group-tabs" id="group-tabs">
        <!-- Filled by JS -->
      </div>
      <button class="group-tab-add" onclick="createGroup()" title="Nouveau groupe">+</button>
    </div>

  </div>

  <!-- EMPTY STATE (no groups yet) -->
  <div class="empty-state hidden" id="empty-state">
    <img src="img/bucheron-salut.png" alt="" class="empty-mascot" />
    <h1 class="empty-title">BONJOUR COACH!</h1>
    <p class="empty-sub">Crée ton premier groupe pour commencer</p>
    <button class="empty-btn" onclick="createGroup()">➕ NOUVEAU GROUPE</button>
  </div>

  <!-- MODAL: CREATE/EDIT GROUP -->
  <div id="group-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeGroupModal()"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="group-modal-title">NOUVEAU GROUPE</h2>
        <button class="modal-close" onclick="closeGroupModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>NOM DU GROUPE</label>
          <input type="text" id="group-name-input" class="form-input" placeholder="Ex: 3e année Groupe A" />
        </div>
        <div class="form-field">
          <label>COULEUR</label>
          <div class="color-picker" id="color-picker">
            <button class="color-swatch c-blue active" data-color="c-blue" onclick="pickColor('c-blue')"></button>
            <button class="color-swatch c-green" data-color="c-green" onclick="pickColor('c-green')"></button>
            <button class="color-swatch c-orange" data-color="c-orange" onclick="pickColor('c-orange')"></button>
            <button class="color-swatch c-pink" data-color="c-pink" onclick="pickColor('c-pink')"></button>
            <button class="color-swatch c-purple" data-color="c-purple" onclick="pickColor('c-purple')"></button>
          </div>
        </div>
        <div class="form-field">
          <label>ÉLÈVES (un par ligne)</label>
          <textarea id="group-students-input" class="form-textarea" rows="8" placeholder="Alexis Beaumont&#10;Camille Dupont&#10;Émile Fortin"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-primary" onclick="saveGroup()">💾 SAUVEGARDER</button>
          <button class="btn-secondary" onclick="importStudentList()">📥 IMPORTER</button>
          <button class="btn-secondary" onclick="closeGroupModal()">ANNULER</button>
          <button class="btn-danger" id="delete-group-btn" onclick="deleteCurrentGroup()" style="display:none;">🗑️ SUPPRIMER</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: LEXIQUE PFEQ -->
  <div id="lexique-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeLexiqueModal()"></div>
    <div class="modal-box modal-lg">
      <div class="modal-header">
        <h2>📚 LEXIQUE PFEQ</h2>
        <button class="modal-close" onclick="closeLexiqueModal()">✕</button>
      </div>
      <div class="modal-body" id="lexique-content">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
